name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libsdl2-dev libsdl2-image-dev

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build
